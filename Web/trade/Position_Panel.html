<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>持仓显示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            background-color: #1e1e1e;
            color: #e0e0e0;
            height: 100%;
            overflow-y: auto;
        }

        .position-container {
            padding: 8px;
        }

        .position-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        .position-table th {
            padding: 4px 6px;
            text-align: left;
            background-color: rgba(52, 152, 219, 0.1);
            color: #3498db;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        .position-table td {
            padding: 3px 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .position-table tr.selectable {
            cursor: pointer;
        }

        .position-table tr.selected {
            background-color: rgba(52, 152, 219, 0.22);
        }

        .position-long, .direction-buy {
            color: #e74c3c;
        }

        .position-short, .direction-sell {
            color: #2ecc71;
        }

        .profit-up {
            color: #e74c3c;
        }

        .profit-down {
            color: #2ecc71;
        }

        .position-summary {
            display: flex;
            gap: 10px;
            padding: 8px;
            background-color: rgba(52, 152, 219, 0.1);
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 11px;
        }

        .summary-item {
            display: flex;
            gap: 4px;
        }

        .summary-label {
            color: #95a5a6;
        }

        .summary-value {
            color: #e0e0e0;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="position-container">
        <div class="position-summary">
            <div class="summary-item">
                <span class="summary-label">总持仓:</span>
                <span class="summary-value">—</span>
            </div>
        </div>

        <table class="position-table">
            <thead>
                <tr>
                    <th>合约</th>
                    <th>方向</th>
                    <th>手数</th>
                    <th>开仓价</th>
                    <th>盈亏</th>
                </tr>
            </thead>
            <tbody id="position-tbody">
                <tr><td colspan="5">加载中…</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        function bridge() {
            try { return window.parent.QuantSevBridge; } catch (e) { return null; }
        }

        var selectedPositionKey = null;

        function directionLegText(direction) {
            var d = String(direction || '').toLowerCase();
            if (d === 'long' || d === 'buy') return '多';
            if (d === 'short' || d === 'sell') return '空';
            return direction || '—';
        }

        function directionLegClass(direction) {
            var d = String(direction || '').toLowerCase();
            if (d === 'long' || d === 'buy') return 'direction-buy';
            if (d === 'short' || d === 'sell') return 'direction-sell';
            return '';
        }

        function positionLegKey(p) {
            return String(p.instrument_id || '') + '|' + String(p.direction || '');
        }

        function renderPositions(data) {
            var tbody = document.getElementById('position-tbody');
            var summary = document.querySelector('.position-summary');
            if (!tbody || !summary) return;

            var positions = (data && data.positions) || [];
            var meta = (data && data.summary) || {};
            var sourceLabel = (data && data.source === 'ctp') ? 'CTP 实时' : 'CTP 缓存';

            summary.innerHTML =
                '<div class="summary-item"><span class="summary-label">总持仓:</span><span class="summary-value">' +
                (meta.total_contracts || 0) + '合约</span></div>' +
                '<div class="summary-item"><span class="summary-label">多头:</span><span class="summary-value position-long">' +
                (meta.total_long || 0) + '手</span></div>' +
                '<div class="summary-item"><span class="summary-label">空头:</span><span class="summary-value position-short">' +
                (meta.total_short || 0) + '手</span></div>' +
                '<div class="summary-item"><span class="summary-label">来源:</span><span class="summary-value">' +
                sourceLabel + '</span></div>';

            if (!positions.length) {
                selectedPositionKey = null;
                tbody.innerHTML = '<tr><td colspan="5">暂无持仓</td></tr>';
                return;
            }

            tbody.innerHTML = positions.map(function (pos) {
                var key = positionLegKey(pos);
                var profit = Number(pos.position_profit || 0);
                var profitClass = profit >= 0 ? 'profit-up' : 'profit-down';
                var selected = selectedPositionKey === key ? ' selected' : '';
                return '<tr class="position-row selectable' + selected + '" data-leg="' + key + '">' +
                    '<td>' + (pos.instrument_id || '—') + '</td>' +
                    '<td class="' + directionLegClass(pos.direction) + '">' + directionLegText(pos.direction) + '</td>' +
                    '<td>' + (pos.volume || 0) + '</td>' +
                    '<td>' + (pos.open_price ? Number(pos.open_price).toFixed(0) : '—') + '</td>' +
                    '<td class="' + profitClass + '">' + (profit >= 0 ? '+' : '') + profit.toFixed(0) + '</td>' +
                    '</tr>';
            }).join('');

            tbody.querySelectorAll('tr.position-row.selectable').forEach(function (row) {
                row.addEventListener('click', function () {
                    selectedPositionKey = row.getAttribute('data-leg');
                    renderPositions(data);
                });
            });
        }

        var positionsCtpSynced = false;

        function loadPositionsData(refresh) {
            var b = bridge();
            if (!b || !b.Trade || !b.Trade.queryPositions) {
                return Promise.reject(new Error('Trade Bridge 未加载'));
            }
            var uid = b.Trade.resolveUserId();
            return b.Trade.queryPositions({ user_id: uid, refresh: !!refresh }).then(function (data) {
                if (data && data.error) {
                    return Promise.reject(new Error(data.error));
                }
                var positions = (data && data.positions) || [];
                if (!positions.length && !refresh && uid && !positionsCtpSynced) {
                    positionsCtpSynced = true;
                    return b.Trade.queryPositions({ user_id: uid, refresh: true });
                }
                return data;
            });
        }

        function bindTradeRefresh() {
            var target = window.parent || window;
            target.addEventListener('quant-sev-trade', function () {
                refreshPositions();
            });
        }

        function refreshPositions() {
            loadPositionsData(false).then(renderPositions).catch(function (err) {
                document.getElementById('position-tbody').innerHTML =
                    '<tr><td colspan="5">加载失败: ' + err.message + '</td></tr>';
            });
        }

        refreshPositions();
        bindTradeRefresh();
        setInterval(refreshPositions, 3000);
    </script>
</body>
</html>
